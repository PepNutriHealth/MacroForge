<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroForge — Nutrition Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #181824;
  --bg-card-hover: #1e1e2e;
  --bg-input: #1a1a28;
  --border: #2a2a3e;
  --border-glow: #3a3a5e;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a8;
  --text-muted: #5a5a78;
  --accent-protein: #ff6b6b;
  --accent-protein-glow: rgba(255,107,107,0.15);
  --accent-carbs: #ffd93d;
  --accent-carbs-glow: rgba(255,217,61,0.15);
  --accent-fat: #6bcbff;
  --accent-fat-glow: rgba(107,203,255,0.15);
  --accent-calories: #c084fc;
  --accent-calories-glow: rgba(192,132,252,0.15);
  --accent-fiber: #4ade80;
  --accent-fiber-glow: rgba(74,222,128,0.15);
  --accent-green: #4ade80;
  --accent-orange: #fb923c;
  --accent-fastfood: #ff8c42;
  --accent-fastfood-glow: rgba(255,140,66,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --meal-breakfast: #fb923c;
  --meal-lunch: #4ade80;
  --meal-dinner: #6bcbff;
  --meal-snacks: #c084fc;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 20% 20%, rgba(192,132,252,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(107,203,255,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px; }

/* HEADER */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0 30px; border-bottom: 1px solid var(--border);
  margin-bottom: 30px; flex-wrap: wrap; gap: 12px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent-protein), var(--accent-calories));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: #fff;
}
.logo-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.logo-text span { color: var(--accent-calories); }
.header-stats {
  display: flex; gap: 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 13px; color: var(--text-secondary);
}
.header-stat { display: flex; align-items: center; gap: 6px; }
.header-stat .dot { width: 8px; height: 8px; border-radius: 50%; }

/* SETUP PANEL */
.setup-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px; margin-bottom: 24px;
  animation: fadeIn 0.4s ease;
}
.setup-title {
  font-size: 16px; font-weight: 600; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.setup-title::before {
  content: ''; width: 4px; height: 18px; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent-calories), var(--accent-protein));
}
.setup-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px; margin-bottom: 18px;
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); font-weight: 500;
}
.field input, .field select {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
  font-size: 14px; outline: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--accent-calories); }
.field select { cursor: pointer; }
.field select option { background: var(--bg-card); }

.macro-split-row {
  display: flex; gap: 14px; align-items: end; flex-wrap: wrap;
  padding-top: 14px; border-top: 1px solid var(--border);
}
.split-field { flex: 1; min-width: 100px; }
.split-field label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 500; display: block; margin-bottom: 6px; }
.split-field input {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
  font-size: 14px; outline: none; transition: border-color 0.2s; text-align: center;
}
.split-field.protein input:focus { border-color: var(--accent-protein); }
.split-field.carbs input:focus { border-color: var(--accent-carbs); }
.split-field.fat input:focus { border-color: var(--accent-fat); }
.split-total {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  padding: 10px 0; min-width: 80px; text-align: center;
}
.split-total.valid { color: var(--accent-green); }
.split-total.invalid { color: var(--accent-protein); }
.btn-calc {
  background: linear-gradient(135deg, var(--accent-calories), #a855f7);
  border: none; border-radius: var(--radius-sm);
  padding: 11px 28px; color: #fff; font-family: 'Outfit', sans-serif;
  font-weight: 600; font-size: 14px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s; margin-top: 14px;
}
.btn-calc:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(168,85,247,0.3); }

/* TARGETS */
.targets-bar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-bottom: 24px; animation: fadeIn 0.4s ease;
}
.target-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; text-align: center;
  position: relative; overflow: hidden;
}
.target-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.target-card.cal::before { background: linear-gradient(90deg, var(--accent-calories), #a855f7); }
.target-card.pro::before { background: linear-gradient(90deg, var(--accent-protein), #ff8888); }
.target-card.carb::before { background: linear-gradient(90deg, var(--accent-carbs), #ffe066); }
.target-card.fat::before { background: linear-gradient(90deg, var(--accent-fat), #88ddff); }
.target-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; }
.target-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; }
.target-card.cal .target-value { color: var(--accent-calories); }
.target-card.pro .target-value { color: var(--accent-protein); }
.target-card.carb .target-value { color: var(--accent-carbs); }
.target-card.fat .target-value { color: var(--accent-fat); }
.target-unit { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.target-progress { margin-top: 10px; height: 4px; background: var(--bg-input); border-radius: 2px; overflow: hidden; }
.target-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.target-card.cal .target-progress-fill { background: var(--accent-calories); }
.target-card.pro .target-progress-fill { background: var(--accent-protein); }
.target-card.carb .target-progress-fill { background: var(--accent-carbs); }
.target-card.fat .target-progress-fill { background: var(--accent-fat); }
.target-consumed { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

/* MAIN LAYOUT */
.main-layout { display: grid; grid-template-columns: 1fr 400px; gap: 24px; }

/* FOOD BROWSER */
.food-browser {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.browser-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.browser-title { font-size: 16px; font-weight: 600; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 14px;
  flex: 1; max-width: 280px;
}
.search-box input {
  background: none; border: none; color: var(--text-primary);
  font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; width: 100%;
}
.search-icon { color: var(--text-muted); font-size: 14px; }

/* MEAL SELECTOR */
.meal-selector {
  display: flex; gap: 4px; padding: 14px 24px;
  border-bottom: 1px solid var(--border);
}
.meal-btn {
  flex: 1; padding: 9px 6px; border-radius: var(--radius-sm);
  background: var(--bg-input); border: 2px solid var(--border);
  color: var(--text-secondary); font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; text-align: center;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.meal-btn:hover { border-color: var(--border-glow); color: var(--text-primary); }
.meal-btn.active { color: #fff; }
.meal-btn[data-meal="breakfast"].active { border-color: var(--meal-breakfast); background: rgba(251,146,60,0.12); color: var(--meal-breakfast); }
.meal-btn[data-meal="lunch"].active { border-color: var(--meal-lunch); background: rgba(74,222,128,0.12); color: var(--meal-lunch); }
.meal-btn[data-meal="dinner"].active { border-color: var(--meal-dinner); background: rgba(107,203,255,0.12); color: var(--meal-dinner); }
.meal-btn[data-meal="snacks"].active { border-color: var(--meal-snacks); background: rgba(192,132,252,0.12); color: var(--meal-snacks); }

.category-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  overflow-x: auto; padding: 0 24px;
}
.cat-tab {
  padding: 12px 18px; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
}
.cat-tab:hover { color: var(--text-primary); }
.cat-tab.active { color: var(--accent-calories); border-bottom-color: var(--accent-calories); }

.food-list { padding: 12px; max-height: 480px; overflow-y: auto; }
.food-list::-webkit-scrollbar { width: 6px; }
.food-list::-webkit-scrollbar-track { background: transparent; }
.food-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.food-item {
  display: grid; grid-template-columns: 1fr auto auto auto auto auto;
  align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.15s; border: 1px solid transparent;
}
.food-item:hover { background: var(--bg-card-hover); border-color: var(--border); }
.food-item.selected { background: rgba(192,132,252,0.06); border-color: rgba(192,132,252,0.2); }
.food-name { font-size: 14px; font-weight: 500; }
.food-serving { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.food-serving.ff-badge { color: var(--accent-fastfood); background: var(--accent-fastfood-glow); padding: 1px 6px; border-radius: 4px; display: inline-block; }
.food-macro {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  text-align: right; min-width: 52px; padding: 4px 8px; border-radius: 6px;
}
.food-macro.cal { color: var(--accent-calories); background: var(--accent-calories-glow); }
.food-macro.pro { color: var(--accent-protein); background: var(--accent-protein-glow); }
.food-macro.carb { color: var(--accent-carbs); background: var(--accent-carbs-glow); }
.food-macro.fat { color: var(--accent-fat); background: var(--accent-fat-glow); }
.food-macro.fib { color: var(--accent-fiber); background: var(--accent-fiber-glow); }

.food-header {
  display: grid; grid-template-columns: 1fr auto auto auto auto auto;
  gap: 10px; padding: 8px 14px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-muted); font-weight: 600;
}
.food-header span:not(:first-child) { text-align: right; min-width: 52px; padding: 0 8px; }

/* MEAL LOG */
.meal-log {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  display: flex; flex-direction: column;
}
.log-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.log-title { font-size: 16px; font-weight: 600; }
.btn-clear {
  background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2);
  color: var(--accent-protein); border-radius: var(--radius-sm);
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif;
}
.btn-clear:hover { background: rgba(255,107,107,0.2); }

.log-scroll { flex: 1; overflow-y: auto; max-height: 520px; }
.log-scroll::-webkit-scrollbar { width: 6px; }
.log-scroll::-webkit-scrollbar-track { background: transparent; }
.log-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* MEAL SECTIONS */
.meal-section { border-bottom: 1px solid var(--border); }
.meal-section:last-child { border-bottom: none; }
.meal-section-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px; cursor: pointer; transition: background 0.15s;
  user-select: none;
}
.meal-section-header:hover { background: var(--bg-card-hover); }
.meal-section-left { display: flex; align-items: center; gap: 10px; }
.meal-dot { width: 10px; height: 10px; border-radius: 50%; }
.meal-section-name {
  font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
}
.meal-section-count {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-muted); background: var(--bg-input);
  padding: 2px 8px; border-radius: 10px;
}
.meal-section-cals {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary);
}
.meal-section-items { padding: 0 12px 8px; }
.meal-section.collapsed .meal-section-items { display: none; }
.meal-section-header .chevron {
  font-size: 10px; color: var(--text-muted); transition: transform 0.2s; margin-left: 6px;
}
.meal-section.collapsed .chevron { transform: rotate(-90deg); }

.meal-subtotal {
  display: flex; gap: 8px; padding: 6px 14px 10px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.meal-subtotal span { padding: 3px 6px; border-radius: 4px; }
.meal-subtotal .st-cal { color: var(--accent-calories); background: var(--accent-calories-glow); }
.meal-subtotal .st-pro { color: var(--accent-protein); background: var(--accent-protein-glow); }
.meal-subtotal .st-carb { color: var(--accent-carbs); background: var(--accent-carbs-glow); }
.meal-subtotal .st-fat { color: var(--accent-fat); background: var(--accent-fat-glow); }

.log-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); margin-bottom: 6px;
  animation: slideIn 0.2s ease;
}
.log-item-info { flex: 1; min-width: 0; }
.log-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-item-macros {
  display: flex; gap: 8px; margin-top: 3px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.log-item-macros span { opacity: 0.7; }
.log-item-qty { display: flex; align-items: center; gap: 5px; margin: 0 8px; }
.qty-btn {
  width: 22px; height: 22px; border-radius: 5px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.15s;
}
.qty-btn:hover { border-color: var(--accent-calories); }
.qty-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; min-width: 18px; text-align: center; }
.log-remove {
  width: 24px; height: 24px; border-radius: 5px;
  background: none; border: 1px solid transparent;
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s; flex-shrink: 0;
}
.log-remove:hover { color: var(--accent-protein); border-color: rgba(255,107,107,0.3); }

.log-empty-meal {
  text-align: center; padding: 14px 10px;
  color: var(--text-muted); font-size: 12px; font-style: italic;
}

/* DAILY SUMMARY */
.log-summary {
  border-top: 1px solid var(--border); padding: 16px 24px;
  background: rgba(192,132,252,0.03);
}
.log-summary-row {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 13px; margin-bottom: 6px;
}
.log-summary-row:last-child { margin-bottom: 0; }
.log-summary-label { color: var(--text-secondary); }
.log-summary-value { font-weight: 600; }

.targets-bar { display: none; }
.main-layout { display: none; }
.app.active .targets-bar { display: grid; }
.app.active .main-layout { display: grid; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
  .targets-bar { grid-template-columns: repeat(2, 1fr); }
  .food-item { grid-template-columns: 1fr auto auto auto; }
  .food-item .food-macro.fib { display: none; }
  .food-header span:nth-child(6) { display: none; }
}
@media (max-width: 600px) {
  .app { padding: 12px; }
  .setup-grid { grid-template-columns: 1fr 1fr; }
  .targets-bar { grid-template-columns: 1fr 1fr; }
  .food-item { grid-template-columns: 1fr auto auto; }
  .food-item .food-macro.carb { display: none; }
  .food-header span:nth-child(4) { display: none; }
  .meal-selector { flex-wrap: wrap; }
  .meal-btn { min-width: calc(50% - 4px); }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">M</div>
      <div class="logo-text">Macro<span>Forge</span></div>
    </div>
    <div class="header-stats">
      <div class="header-stat"><div class="dot" style="background:var(--accent-protein)"></div> Protein</div>
      <div class="header-stat"><div class="dot" style="background:var(--accent-carbs)"></div> Carbs</div>
      <div class="header-stat"><div class="dot" style="background:var(--accent-fat)"></div> Fat</div>
      <div class="header-stat"><div class="dot" style="background:var(--accent-fiber)"></div> Fiber</div>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup-panel">
    <div class="setup-title">Body Stats &amp; Macro Calculator</div>
    <div class="setup-grid">
      <div class="field"><label>Sex</label><select id="sex"><option value="male">Male</option><option value="female">Female</option></select></div>
      <div class="field"><label>Age</label><input type="number" id="age" value="30" min="14" max="100"></div>
      <div class="field"><label>Weight (lbs)</label><input type="number" id="weight" value="180" min="80" max="500"></div>
      <div class="field"><label>Height (in)</label><input type="number" id="height" value="70" min="48" max="96"></div>
      <div class="field"><label>Activity</label><select id="activity"><option value="1.2">Sedentary</option><option value="1.375">Light (1-3x/wk)</option><option value="1.55" selected>Moderate (3-5x/wk)</option><option value="1.725">Active (6-7x/wk)</option><option value="1.9">Very Active (2x/day)</option></select></div>
      <div class="field"><label>Goal</label><select id="goal"><option value="-500">Cut (-500 cal)</option><option value="-250">Mild Cut (-250)</option><option value="0" selected>Maintain</option><option value="250">Lean Bulk (+250)</option><option value="500">Bulk (+500)</option></select></div>
    </div>
    <div class="macro-split-row">
      <div class="split-field protein"><label>Protein %</label><input type="number" id="protPct" value="30" min="10" max="60"></div>
      <div class="split-field carbs"><label>Carbs %</label><input type="number" id="carbPct" value="40" min="10" max="70"></div>
      <div class="split-field fat"><label>Fat %</label><input type="number" id="fatPct" value="30" min="10" max="60"></div>
      <div class="split-total" id="splitTotal">= 100%</div>
      <button class="btn-calc" id="btnCalc">Calculate Macros</button>
    </div>
  </div>

  <!-- TARGETS -->
  <div class="targets-bar">
    <div class="target-card cal">
      <div class="target-label">Calories</div>
      <div class="target-value" id="tgtCal">0</div>
      <div class="target-unit">kcal</div>
      <div class="target-progress"><div class="target-progress-fill" id="progCal" style="width:0%"></div></div>
      <div class="target-consumed" id="conCal">0 consumed</div>
    </div>
    <div class="target-card pro">
      <div class="target-label">Protein</div>
      <div class="target-value" id="tgtPro">0</div>

const MEALS = [

  {id:"lunch",label:"Lunch",color:"var(--meal-lunch)"},
  {id:"dinner",label:"Dinner",color:"var(--meal-dinner)"},
  {id:"snacks",label:"Snacks",color:"var(--meal-snacks)"},
];

// ── STATE ──
let targets = {cal:0,pro:0,carb:0,fat:0};
let log = {breakfast:[],lunch:[],dinner:[],snacks:[]};
let activeMeal = "breakfast";
let activeCategory = "all";
let searchTerm = "";
let collapsedMeals = {};

// ── MIFFLIN-ST JEOR ──
function calculate() {
  const sex = document.getElementById('sex').value;
  const age = +document.getElementById('age').value;
  const wLbs = +document.getElementById('weight').value;
  const hIn = +document.getElementById('height').value;
  const act = +document.getElementById('activity').value;
  const goalAdj = +document.getElementById('goal').value;
  const pp = +document.getElementById('protPct').value;
  const cp = +document.getElementById('carbPct').value;
  const fp = +document.getElementById('fatPct').value;
  const wKg = wLbs * 0.453592, hCm = hIn * 2.54;
  const bmr = sex === 'male' ? (10*wKg)+(6.25*hCm)-(5*age)+5 : (10*wKg)+(6.25*hCm)-(5*age)-161;
  const totalCal = Math.round(bmr * act) + goalAdj;
  targets.cal = Math.round(totalCal);
  targets.pro = Math.round((totalCal*(pp/100))/4);
  targets.carb = Math.round((totalCal*(cp/100))/4);
  targets.fat = Math.round((totalCal*(fp/100))/9);
  document.getElementById('tgtCal').textContent = targets.cal.toLocaleString();
  document.getElementById('tgtPro').textContent = targets.pro;
  document.getElementById('tgtCarb').textContent = targets.carb;
  document.getElementById('tgtFat').textContent = targets.fat;
  document.getElementById('app').classList.add('active');
  updateProgress();
}

// ── SPLIT VALIDATOR ──
function updateSplit() {
  const t = (+document.getElementById('protPct').value)+(+document.getElementById('carbPct').value)+(+document.getElementById('fatPct').value);
  const el = document.getElementById('splitTotal');
  el.textContent = `= ${t}%`;
  el.className = 'split-total '+(t===100?'valid':'invalid');
}
['protPct','carbPct','fatPct'].forEach(id => document.getElementById(id).addEventListener('input', updateSplit));
updateSplit();

// ── MEAL SELECTOR ──
document.querySelectorAll('.meal-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeMeal = btn.dataset.meal;
  });
});

function renderTabs() {
  const c = document.getElementById('catTabs');
  c.innerHTML = CATEGORIES.map(cat =>

  ).join('');
  c.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => { activeCategory=tab.dataset.cat; renderTabs(); renderFoods(); });
  });
}

// ── FOOD LIST ──
function renderFoods() {
  const list = document.getElementById('foodList');
  let foods = FOODS;
  if (activeCategory!=='all') foods = foods.filter(f=>f.cat===activeCategory);
  if (searchTerm) { const s=searchTerm.toLowerCase(); foods=foods.filter(f=>f.name.toLowerCase().includes(s)); }
  const loggedNames = new Set();
  Object.values(log).forEach(arr=>arr.forEach(l=>loggedNames.add(l.food.name)));
  list.innerHTML = foods.map(f=>`
    <div class="food-item ${loggedNames.has(f.name)?'selected':''}" data-name="${f.name}">
      <div><div class="food-name">${f.name}</div><div class="food-serving${f.cat==='fastfood'?' ff-badge':''}">${f.serving}</div></div>
      <div class="food-macro cal">${f.cal}</div>
      <div class="food-macro pro">${f.pro}g</div>
      <div class="food-macro carb">${f.carb}g</div>
      <div class="food-macro fat">${f.fat}g</div>
      <div class="food-macro fib">${f.fib}g</div>
    </div>`).join('');
  list.querySelectorAll('.food-item').forEach(item=>{
    item.addEventListener('click',()=>addFood(item.dataset.name));
  });
}

// ── LOG ──
function addFood(name) {
  const arr = log[activeMeal];
  const ex = arr.find(l=>l.food.name===name);
  if(ex) ex.qty++; else { const f=FOODS.find(f=>f.name===name); if(f) arr.push({food:f,qty:1}); }
  renderLog(); renderFoods(); updateProgress();
}

function mealTotals(id) {
  return log[id].reduce((a,e)=>({cal:a.cal+e.food.cal*e.qty,pro:a.pro+e.food.pro*e.qty,carb:a.carb+e.food.carb*e.qty,fat:a.fat+e.food.fat*e.qty}),{cal:0,pro:0,carb:0,fat:0});
}
function getTotals() {
  const t={cal:0,pro:0,carb:0,fat:0};
  MEALS.forEach(m=>{const mt=mealTotals(m.id);t.cal+=mt.cal;t.pro+=mt.pro;t.carb+=mt.carb;t.fat+=mt.fat;});
  return t;
}

function renderLog() {
  const scroll = document.getElementById('logScroll');
  let html='';
  MEALS.forEach(meal=>{
    const items=log[meal.id], mt=mealTotals(meal.id), collapsed=collapsedMeals[meal.id];
    html+=`<div class="meal-section ${collapsed?'collapsed':''}" data-meal-section="${meal.id}">
      <div class="meal-section-header" data-toggle="${meal.id}">
        <div class="meal-section-left">
          <div class="meal-dot" style="background:${meal.color}"></div>
          <span class="meal-section-name" style="color:${meal.color}">${meal.label}</span>
          <span class="meal-section-count">${items.length} item${items.length!==1?'s':''}</span>
          <span class="chevron">&#9660;</span>
        </div>
        <div class="meal-section-cals">${mt.cal>0?mt.cal+' cal':''}</div>
      </div>
      <div class="meal-section-items">`;
    if(!items.length){
      html+=`<div class="log-empty-meal">No foods logged yet</div>`;
    } else {
      items.forEach((entry,i)=>{
        const f=entry.food, q=entry.qty;
        html+=`<div class="log-item">
          <div class="log-item-info">
            <div class="log-item-name">${f.name}${q>1?' &times;'+q:''}</div>
            <div class="log-item-macros">
              <span style="color:var(--accent-calories)">${f.cal*q} cal</span>
              <span style="color:var(--accent-protein)">${f.pro*q}p</span>
              <span style="color:var(--accent-carbs)">${f.carb*q}c</span>
              <span style="color:var(--accent-fat)">${f.fat*q}f</span>
            </div>
          </div>
          <div class="log-item-qty">
            <button class="qty-btn" data-meal="${meal.id}" data-idx="${i}" data-dir="-1">&minus;</button>
            <span class="qty-val">${q}</span>
            <button class="qty-btn" data-meal="${meal.id}" data-idx="${i}" data-dir="1">+</button>
          </div>
          <button class="log-remove" data-meal="${meal.id}" data-idx="${i}">&times;</button>
        </div>`;
      });
      html+=`<div class="meal-subtotal">
        <span class="st-cal">${mt.cal} cal</span>
        <span class="st-pro">${mt.pro}g P</span>
        <span class="st-carb">${mt.carb}g C</span>
        <span class="st-fat">${mt.fat}g F</span>
      </div>`;
    }
    html+=`</div></div>`;
  });
  scroll.innerHTML=html;

  // Events
  scroll.querySelectorAll('.meal-section-header').forEach(h=>{
    h.addEventListener('click',()=>{ collapsedMeals[h.dataset.toggle]=!collapsedMeals[h.dataset.toggle]; renderLog(); });
  });
  scroll.querySelectorAll('.qty-btn').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const m=b.dataset.meal, i=+b.dataset.idx, d=+b.dataset.dir;
      log[m][i].qty+=d; if(log[m][i].qty<=0) log[m].splice(i,1);
      renderLog(); renderFoods(); updateProgress();
    });
  });
  scroll.querySelectorAll('.log-remove').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation(); log[b.dataset.meal].splice(+b.dataset.idx,1);
      renderLog(); renderFoods(); updateProgress();
    });
  });
  updateSummary();
}

function updateSummary() {
  const t=getTotals();
  document.getElementById('sumCal').textContent=t.cal.toLocaleString();
  document.getElementById('sumPro').textContent=t.pro+'g';
  document.getElementById('sumCarb').textContent=t.carb+'g';
  document.getElementById('sumFat').textContent=t.fat+'g';
  const r=targets.cal-t.cal, el=document.getElementById('sumRemain');
  el.textContent=r.toLocaleString();
  el.style.color=r>=0?'var(--accent-green)':'var(--accent-protein)';
}

function updateProgress() {
  const t=getTotals();
  const p=(v,g)=>g>0?Math.min((v/g)*100,100):0;
  document.getElementById('progCal').style.width=p(t.cal,targets.cal)+'%';
  document.getElementById('progPro').style.width=p(t.pro,targets.pro)+'%';
  document.getElementById('progCarb').style.width=p(t.carb,targets.carb)+'%';
  document.getElementById('progFat').style.width=p(t.fat,targets.fat)+'%';
  document.getElementById('conCal').textContent=`${t.cal.toLocaleString()} consumed`;
  document.getElementById('conPro').textContent=`${t.pro}g consumed`;
  document.getElementById('conCarb').textContent=`${t.carb}g consumed`;
  document.getElementById('conFat').textContent=`${t.fat}g consumed`;
  updateSummary();
}

// ── EVENTS ──
document.getElementById('btnCalc').addEventListener('click',()=>{
  const t=(+document.getElementById('protPct').value)+(+document.getElementById('carbPct').value)+(+document.getElementById('fatPct').value);
  if(t!==100){alert('Macro split must equal 100%');return;} calculate();
});
document.getElementById('btnClear').addEventListener('click',()=>{
  log={breakfast:[],lunch:[],dinner:[],snacks:[]}; renderLog(); renderFoods(); updateProgress();
});
document.getElementById('searchInput').addEventListener('input',e=>{ searchTerm=e.target.value; renderFoods(); });

// ── INIT ──
renderTabs(); renderFoods(); renderLog();
</script>
</body>
</html>
